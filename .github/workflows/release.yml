name: Official Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Package and Publish Framework
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build Core Engine Wheel
        run: |
          python -m pip install --upgrade pip build wheel
          python -m build

      - name: Bundle Deployment Package
        run: |
          mkdir deploy_package
          cp -r api deploy_package/
          cp -r configs deploy_package/
          cp -r image_gen deploy_package/
          cp requirements.txt deploy_package/
          cp README.md deploy_package/
          zip -r Image-Gen-Lite-Production-Core.zip deploy_package/

      - name: Generate Changelog
        id: changelog
        run: |
          # Grabbing notes from the latest tag annotation and commits
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          git tag -l --format='%(contents)' ${{ github.ref_name }} >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Automated Release Framework Build" >> $GITHUB_OUTPUT
          echo "- **Commit Hash**: ${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "- Includes Core Python \`Wheel\` binaries for production deployment." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Image Gen Lite Framework ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            Image-Gen-Lite-Production-Core.zip
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
